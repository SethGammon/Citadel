appId: com.citadel.desktop
productName: Citadel

directories:
  output: dist-electron/build
  buildResources: assets

files:
  - dist/**/*
  - dist-electron/main/**/*
  - dist-electron/preload/**/*
  - package.json

win:
  target:
    - target: nsis
      arch:
        - x64

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64

linux:
  target:
    - target: AppImage
      arch:
        - x64
