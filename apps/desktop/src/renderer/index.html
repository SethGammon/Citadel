<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src ws://localhost:*"
    />
    <title>Citadel</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body,
      #root {
        height: 100%;
        width: 100%;
        background: #0a0a0a;
        color: #e5e5e5;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          sans-serif;
        font-size: 14px;
        -webkit-font-smoothing: antialiased;
      }
      :root {
        /* Depth shadows — use these instead of ad-hoc box-shadow values */
        --shadow-depth-1: 0 1px 3px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.02);
        --shadow-depth-2: 0 4px 12px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.03);
        --shadow-depth-3: 0 8px 32px rgba(0,0,0,0.8);

        /* Color tokens */
        --c-bg-base: #0a0a0a;
        --c-bg-elevated: #0d0d0d;
        --c-bg-surface: #141414;
        --c-bg-surface-2: #1a1a1a;
        --c-bg-hover: #1e1e1e;
        --c-border: #1a1a1a;
        --c-border-subtle: rgba(255,255,255,0.05);
        --c-border-highlight: rgba(167,139,250,0.25);

        --c-text-primary: #e5e5e5;
        --c-text-secondary: #aaa;
        --c-text-muted: #666;
        --c-text-faint: #444;

        --c-accent: #a78bfa;
        --c-accent-dim: rgba(167,139,250,0.15);
        --c-accent-border: rgba(167,139,250,0.25);

        /* Active nav indicator */
        --nav-active-border: 2px solid #a78bfa;
      }

      /* Scrollbar styling for dark surfaces */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #333; }

      /* Text selection */
      ::selection { background: rgba(167,139,250,0.25); color: #e5e5e5; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
