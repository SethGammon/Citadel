name: Publish npm package

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish the verified package through npm trusted publishing
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  verify:
    if: ${{ inputs.publish == true }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Use trusted-publishing capable npm
        run: npm install --global npm@11.5.1
      - name: Run full strict verification
        run: node scripts/test-all.js --strict
      - name: Inspect npm package boundary
        run: node scripts/test-cli-package.js
      - name: Create package directory
        run: mkdir -p dist/npm
      - name: Build npm package
        run: npm pack --pack-destination dist/npm
      - name: Upload verified package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-package
          path: dist/npm/*.tgz
          if-no-files-found: error
          retention-days: 1

  publish:
    if: ${{ inputs.publish == true }}
    needs: verify
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: npm-package
          path: dist/npm
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Use trusted-publishing capable npm
        run: npm install --global npm@11.5.1
      - name: Publish with npm provenance
        run: npm publish dist/npm/*.tgz --access public --provenance
