name: Publish npm package

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish the verified package through npm trusted publishing
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  verify:
    if: ${{ inputs.publish == true }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Use trusted-publishing capable npm
        run: npm install --global npm@11.5.1
      - name: Run full strict verification
        run: node scripts/test-all.js --strict
      - name: Inspect npm package boundary
        run: node scripts/test-cli-package.js
      - name: Create package directory
        run: mkdir -p dist/npm
      - name: Build npm package
        run: npm pack --pack-destination dist/npm
      - name: Upload verified package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-package
          path: dist/npm/*.tgz
          if-no-files-found: error
          retention-days: 1

  publish:
    if: ${{ inputs.publish == true }}
    needs: verify
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-package
          path: dist/npm
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Use trusted-publishing capable npm
        run: npm install --global npm@11.5.1
      - name: Publish with npm provenance
        run: npm publish dist/npm/*.tgz --access public --provenance
