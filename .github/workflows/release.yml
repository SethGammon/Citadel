name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  verify:
    name: verify node ${{ matrix.node }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [18, 20]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node }}
      - name: Run strict verification suite
        run: node scripts/test-all.js --strict
      - name: Verify deterministic release packaging
        run: node scripts/release-package.js --ref "${{ github.ref_name }}" --dry-run --verify-reproducible

  package:
    name: package tagged release
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
      - name: Build tagged artifact
        run: node scripts/release-package.js --ref "${{ github.ref_name }}" --output-dir dist/release --verify-reproducible
      - name: Verify tagged artifact
        run: node scripts/release-verify.js "dist/release/citadel-${{ github.ref_name }}.tar.gz" --ref "${{ github.ref_name }}"
      - name: Publish verified GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: gh release create "$TAG" dist/release/* --verify-tag --generate-notes --title "Citadel $TAG"
