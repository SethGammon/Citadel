name: HOL Plugin Scanner

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: HOL Plugin Scanner
        uses: hashgraph-online/ai-plugin-scanner-action@5e3521a52fd41cb0460fe0919f078ed098a62b0f # v1
        with:
          plugin_dir: "."
          mode: scan
          min_score: 80
          fail_on_severity: high
          format: sarif
          output: ${{ github.workspace }}/plugin-scanner.sarif
          upload_sarif: true
      - name: Summarize scanner finding coordinates
        if: failure()
        run: node scripts/sarif-coordinates.js plugin-scanner.sarif
      - name: Upload failed scanner report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: hol-plugin-scanner-sarif
          path: plugin-scanner.sarif
          if-no-files-found: error
          retention-days: 7
