name: HOL Plugin Scanner

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: HOL Plugin Scanner
        uses: hashgraph-online/ai-plugin-scanner-action@fd21fc9589344b8740b4e0076c5562fa2d0fa72b # v1
        with:
          plugin_dir: "."
          mode: scan
          min_score: 80
          fail_on_severity: high
          format: sarif
          output: ${{ github.workspace }}/plugin-scanner.sarif
          upload_sarif: true
      - name: Summarize scanner finding coordinates
        if: failure()
        run: node scripts/sarif-coordinates.js plugin-scanner.sarif
      - name: Upload failed scanner report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: hol-plugin-scanner-sarif
          path: plugin-scanner.sarif
          if-no-files-found: error
          retention-days: 7
